<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>生字消消乐 · 一年级全册（部编版）</title>
    <style>
        /* 2. 核心优化：利用 CSS 彻底移除移动端 300ms 点击延迟，禁用所有原生手势 */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none; /* 禁用长按选择文字 */
            touch-action: none;        /* 彻底禁用浏览器的所有默认手势（缩放、滚动等），交给JS控 */
            -webkit-tap-highlight-color: transparent; /* 移除点击时阴影闪烁 */
        }
        
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #FDE2C4 0%, #C9E4DE 100%);
            font-family: 'Comic Neue', 'Segoe UI', 'Chalkboard SE', cursive, sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* 允许游戏内容区域在必要时单独内部滚动 */
        .game-board {
            touch-action: pan-y !important; /* 仅允许上下滑动内容，不影响点击 */
        }

        .game-wrapper {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 250, 240, 0.96);
            border-radius: 64px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(3px);
            padding: 20px 28px 32px;
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            margin: 0 0 15px;
            color: #A06B48;
            text-shadow: 2px 2px 0 #FFE0B5;
        }
        .filters {
            background: #FFF5E8;
            border-radius: 50px;
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px 20px;
            margin-bottom: 25px;
        }
        /* 顶部菜单由于有下拉框，单独恢复默认触摸行为 */
        .filters, .toolbar {
            touch-action: auto !important;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 5px 15px;
            border-radius: 40px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        .filter-group label {
            font-weight: bold;
            color: #A06B48;
        }
        select, .mode-btn {
            background: #FFF2E0;
            border: 1px solid #EECBA0;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.95rem;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
        }
        .mode-switch {
            display: flex;
            gap: 10px;
            background: #FFF5E8;
            border-radius: 40px;
            padding: 4px 8px;
        }
        .mode-btn.active {
            background: #FFB882;
            color: white;
            border: none;
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            background: #FFFAF0;
            padding: 8px 18px;
            border-radius: 50px;
            margin-bottom: 20px;
        }
        .score-area, .timer-area {
            background: #FFEEDD;
            border-radius: 30px;
            padding: 6px 20px;
            font-weight: bold;
            font-size: 1rem;
        }
        button {
            background: #FFE0B5;
            border: none;
            border-radius: 30px;
            padding: 6px 18px;
            font-weight: bold;
            cursor: pointer;
        }
        button:active { transform: scale(0.96); }
        .nav-buttons {
            display: flex;
            gap: 8px;
        }
        .game-board {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 12px;
            max-height: 58vh;
            overflow-y: auto;
            padding: 8px 4px;
        }
        .card {
            background: #FDEBD8;
            aspect-ratio: 1 / 0.9;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            color: #5A3E2B;
            box-shadow: 0 8px 0 #CDB28A;
            cursor: pointer;
            transition: transform 0.05s linear; /* 缩短过渡动画时间，提高连击操作跟手度 */
            padding: 8px;
            word-break: break-word;
        }
        .card[data-type="pinyin"] {
            background: #D9E8F5;
            color: #2E5C3B;
        }
        .card.selected {
            background: #FFD599;
            transform: translateY(4px);
            box-shadow: 0 2px 0 #CDB28A;
        }
        .card.matched {
            visibility: hidden;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.7);
            transition: 0.1s;
        }
        .duel-container {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        .player-panel {
            flex: 1;
            background: rgba(255, 248, 235, 0.8);
            border-radius: 48px;
            padding: 12px;
        }
        .player-panel h3 {
            text-align: center;
            margin: 0 0 8px;
            font-size: 1.3rem;
        }
        .player-panel.red h3 { color: #C5422F; }
        .player-panel.blue h3 { color: #2D6A8F; }
        .hero-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            backdrop-filter: blur(6px);
        }
        .victory-container {
            text-align: center;
            animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .victory-trophy {
            font-size: 8rem;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
            animation: spin 0.8s ease-out;
        }
        .victory-text {
            font-size: 3rem;
            font-weight: bold;
            color: gold;
            text-shadow: 4px 4px 0 #c0392b;
            margin-top: 20px;
            background: rgba(0,0,0,0.6);
            padding: 10px 30px;
            border-radius: 50px;
            display: inline-block;
        }
        @keyframes bounceIn {
            0% { transform: scale(0.1); opacity: 0; }
            60% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes spin {
            0% { transform: rotate(0deg) scale(0.5); opacity: 0; }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); opacity: 1; }
        }
        footer {
            text-align: center;
            font-size: 1rem;
            color: #A06B48;
            margin-top: 20px;
            padding: 10px;
            background: #FFF5E8;
            border-radius: 40px;
            font-weight: bold;
        }
        .author {
            font-size: 0.7rem;
            color: rgba(0, 0, 0, 0.5);
            margin-top: 6px;
            font-weight: normal;
        }
        @media (max-width: 750px) {
            .game-board { grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); }
            .card { font-size: 0.85rem; }
            .victory-trophy { font-size: 4rem; }
            .victory-text { font-size: 1.8rem; }
            .toolbar { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <h1>📖 生字消消乐 · 一年级全册（部编版）</h1>

    <div class="filters">
        <div class="filter-group"><label>📚 年级</label><select id="gradeSelect"><option value="1">一年级</option></select></div>
        <div class="filter-group"><label>📖 上下册</label><select id="volumeSelect"><option value="up">上册</option><option value="down">下册</option></select></div>
        <div class="filter-group"><label>📘 课文</label><select id="lessonSelect"></select></div>
        <div class="mode-switch">
            <button id="singleModeBtn" class="mode-btn active">👤 单人对战</button>
            <button id="duelModeBtn" class="mode-btn">⚔️ 双人对战</button>
        </div>
    </div>

    <div class="toolbar">
        <div class="score-area" id="scoreDisplay">✅ 配对: 0 / 0</div>
        <div class="timer-area" id="timerDisplay">⏱️ 用时: 0.00 秒</div>
        <div class="nav-buttons">
            <button id="prevLessonBtn">⬅️ 上一课</button>
            <button id="nextLessonBtn">下一课 ➡️</button>
        </div>
        <button id="resetGameBtn">🔄 新的一局</button>
        <button id="bgmToggleBtn">🎵 背景音乐开</button>
        <button id="muteBtn">🔊 音效开</button>
    </div>

    <div id="singleArea">
        <div class="game-board" id="singleGameBoard"></div>
        <div id="recordMsg" style="text-align:center; margin-top:12px;"></div>
    </div>

    <div id="duelArea" style="display: none;">
        <div class="duel-container">
            <div class="player-panel red"><h3>🔴 红方</h3><div class="game-board" id="redBoard"></div><div style="text-align:center;">配对: <span id="redScore">0</span> / <span id="redTotal">0</span></div></div>
            <div class="player-panel blue"><h3>🔵 蓝方</h3><div class="game-board" id="blueBoard"></div><div style="text-align:center;">配对: <span id="blueScore">0</span> / <span id="blueTotal">0</span></div></div>
        </div>
    </div>
    <footer>
        🌟 每一次配对都是进步，坚持练习，你会成为识字小英雄！ 🌟
        <div class="author">🍃 花一 · 陪你快乐学生字</div>
    </footer>
</div>
<div id="victoryOverlay" class="hero-overlay">
    <div class="victory-container">
        <div class="victory-trophy">🏆🎉✨</div>
        <div class="victory-text" id="victoryMessage">胜利！</div>
    </div>
</div>

    // ========== 音频控制中心 ==========
    let soundEnabled = true;
    let bgmEnabled = true;
    let isAudioUnlocked = false;

    const correctAudio = new Audio('sounds/correct.mp3'); correctAudio.preload = 'auto';
    const wrongAudio = new Audio('sounds/wrong.mp3');     wrongAudio.preload = 'auto';
    const winAudio = new Audio('sounds/win.mp3');         winAudio.preload = 'auto';
    const bgmAudio = new Audio('sounds/bgm.mp3');         bgmAudio.preload = 'auto';
    bgmAudio.loop = true;
    bgmAudio.volume = 0.3;

    function playSound(audioObj) {
        if (!soundEnabled) return;
        try {
            audioObj.currentTime = 0;
            audioObj.play().catch(() => {});
        } catch(e) {}
    }

    function toggleBgm() {
        if (bgmEnabled) {
            bgmAudio.pause();
            bgmEnabled = false;
            document.getElementById('bgmToggleBtn').innerText = '🎵 背景音乐关';
        } else {
            bgmAudio.play().catch(() => {});
            bgmEnabled = true;
            document.getElementById('bgmToggleBtn').innerText = '🎵 背景音乐开';
        }
    }

    function unlockAndPreloadAudio() {
        if (isAudioUnlocked) return;
        const placeholderAudios = [correctAudio, wrongAudio, winAudio];
        placeholderAudios.forEach(audio => {
            const oldVol = audio.volume;
            audio.volume = 0;
            audio.play().then(() => {
                audio.pause();
                audio.volume = oldVol;
            }).catch(() => {});
        });

        if (bgmEnabled) {
            bgmAudio.play().then(() => {
                isAudioUnlocked = true;
                document.removeEventListener('touchstart', unlockAndPreloadAudio);
                document.removeEventListener('click', unlockAndPreloadAudio);
            }).catch(e => {
                console.log("音频唤醒中...", e);
            });
        }
    }

    // 这里保留普通的点击行为唤醒音频
    document.addEventListener('touchstart', unlockAndPreloadAudio, { passive: true });
    document.addEventListener('click', unlockAndPreloadAudio);

    // ========== 游戏变量与逻辑 ==========
    let currentVolume = "up";
    let currentLesson = "";
    let isDuelMode = false;
    let singleCards = [], singleMatched = 0, singleTotalPairs = 0, singleSelectedIdx = null, singleLock = false, singleActive = true;
    let startTime = null, timerInterval = null, bestTimeKey = "best_1_up_", bestTime = Infinity;

    let redCards = [], blueCards = [], redMatched = 0, blueMatched = 0, redTotal = 0, blueTotal = 0;
    let redSelected = null, blueSelected = null, redLock = false, blueLock = false;
    let winnerDeclared = false;

    const singleAreaDiv = document.getElementById('singleArea');
    const duelAreaDiv = document.getElementById('duelArea');
    const singleBoardDiv = document.getElementById('singleGameBoard');
    const redBoardDiv = document.getElementById('redBoard');
    const blueBoardDiv = document.getElementById('blueBoard');
    const scoreDisplaySpan = document.getElementById('scoreDisplay');
    const timerDisplaySpan = document.getElementById('timerDisplay');
    const recordMsgSpan = document.getElementById('recordMsg');
    const redScoreSpan = document.getElementById('redScore');
    const blueScoreSpan = document.getElementById('blueScore');
    const redTotalSpan = document.getElementById('redTotal');
    const blueTotalSpan = document.getElementById('blueTotal');
    const gradeSelect = document.getElementById('gradeSelect');
    const volumeSelect = document.getElementById('volumeSelect');
    const lessonSelect = document.getElementById('lessonSelect');
    const prevLessonBtn = document.getElementById('prevLessonBtn');
    const nextLessonBtn = document.getElementById('nextLessonBtn');
    const muteBtn = document.getElementById('muteBtn');

    // 绑定高性能多端点击事件的处理函数
    function bindFastClick(element, handler) {
        // 移动端/iPadOS 使用 touchstart 瞬间响应，并拦截默认行为防止穿透和双击误判
        element.addEventListener('touchstart', function(e) {
            e.preventDefault(); // 极其重要：掐断系统300ms判断和缩放识别
            handler(e);
        }, { passive: false });

        // 电脑端/常规环境保留 click 降级兼容
        element.addEventListener('click', function(e) {
            handler(e);
        });
    }

    function updateLessonOptions() {
        const key = `${gradeSelect.value}_${volumeSelect.value}`;
        const lessons = WORDS_LIB[key] ? Object.keys(WORDS_LIB[key]) : [];
        lessonSelect.innerHTML = '';
        if (lessons.length === 0) {
            const opt = document.createElement('option');
            opt.textContent = '暂无课文';
            lessonSelect.appendChild(opt);
            currentLesson = '';
        } else {
            lessons.forEach(lesson => {
                const opt = document.createElement('option');
                opt.value = lesson;
                opt.textContent = lesson;
                lessonSelect.appendChild(opt);
            });
            currentLesson = lessons[0];
            lessonSelect.value = currentLesson;
        }
    }

    function getCurrentWordList() {
        const key = `${gradeSelect.value}_${volumeSelect.value}`;
        if (!WORDS_LIB[key] || !WORDS_LIB[key][currentLesson]) return [];
        return WORDS_LIB[key][currentLesson];
    }

    function buildCardSet(words) {
        let deck = [];
        words.forEach((word, idx) => {
            deck.push({ id: `w_${idx}`, word: word, display: word, type: 'word', pairId: idx, matched: false });
            deck.push({ id: `p_${idx}`, word: word, display: getPinyin(word), type: 'pinyin', pairId: idx, matched: false });
        });
        for (let i = deck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [deck[i], deck[j]] = [deck[j], deck[i]];
        }
        return deck;
    }

    function setLesson(lesson) {
        currentLesson = lesson;
        lessonSelect.value = currentLesson;
        if (isDuelMode) resetDuel();
        else resetSingle();
    }

    function prevLesson() {
        const key = `${gradeSelect.value}_${volumeSelect.value}`;
        const lessons = WORDS_LIB[key] ? Object.keys(WORDS_LIB[key]) : [];
        if (lessons.length === 0) return;
        let idx = lessons.indexOf(currentLesson);
        if (idx === -1) idx = 0;
        const newIdx = (idx - 1 + lessons.length) % lessons.length;
        setLesson(lessons[newIdx]);
    }

    function nextLesson() {
        const key = `${gradeSelect.value}_${volumeSelect.value}`;
        const lessons = WORDS_LIB[key] ? Object.keys(WORDS_LIB[key]) : [];
        if (lessons.length === 0) return;
        let idx = lessons.indexOf(currentLesson);
        if (idx === -1) idx = 0;
        const newIdx = (idx + 1) % lessons.length;
        setLesson(lessons[newIdx]);
    }

    function resetSingle() {
        if (timerInterval) clearInterval(timerInterval);
        const words = getCurrentWordList();
        if (!words.length) {
            singleBoardDiv.innerHTML = '<div style="padding:40px;text-align:center;">⚠️ 当前课文暂无生字，请选择其他课文</div>';
            singleActive = false;
            return;
        }
        singleCards = buildCardSet(words);
        singleTotalPairs = words.length;
        singleMatched = 0;
        singleSelectedIdx = null;
        singleLock = false;
        singleActive = true;
        startTime = null;
        timerDisplaySpan.innerText = "⏱️ 用时: 0.00 秒";
        bestTimeKey = `best_${gradeSelect.value}_${volumeSelect.value}_${currentLesson}`;
        bestTime = localStorage.getItem(bestTimeKey) ? parseFloat(localStorage.getItem(bestTimeKey)) : Infinity;
        recordMsgSpan.innerHTML = bestTime !== Infinity ? `🏆 最佳记录: ${bestTime.toFixed(2)} 秒` : "✨ 挑战记录，等你刷新！";
        renderSingleBoard();
        updateScoreUI();
        if (isAudioUnlocked && bgmEnabled && bgmAudio.paused) {
            bgmAudio.play().catch(() => {});
        }
    }

    function renderSingleBoard() {
        singleBoardDiv.innerHTML = '';
        singleCards.forEach((card, idx) => {
            const div = document.createElement('div');
            div.className = 'card';
            if (card.matched) div.classList.add('matched');
            if (singleSelectedIdx === idx) div.classList.add('selected');
            if (card.type === 'pinyin') div.setAttribute('data-type', 'pinyin');
            div.textContent = card.display;
            
            // 绑定毫秒级瞬发点击事件
            bindFastClick(div, () => onSingleClick(idx));
            
            singleBoardDiv.appendChild(div);
        });
    }

    function onSingleClick(clickedIdx) {
        if (!singleActive || singleLock) return;
        unlockAndPreloadAudio();
        
        const card = singleCards[clickedIdx];
        if (card.matched) return;
        if (!startTime) {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                if (!singleActive) return;
                const elapsed = (Date.now() - startTime) / 1000;
                timerDisplaySpan.innerText = `⏱️ 用时: ${elapsed.toFixed(2)} 秒`;
            }, 100);
        }
        if (singleSelectedIdx === null) {
            singleSelectedIdx = clickedIdx;
            renderSingleBoard();
            return;
        }
        if (singleSelectedIdx === clickedIdx) {
            singleSelectedIdx = null;
            renderSingleBoard();
            return;
        }
        const firstCard = singleCards[singleSelectedIdx];
        const secondCard = card;
        if (firstCard.pairId === secondCard.pairId && firstCard.type !== secondCard.type) {
            firstCard.matched = true;
            secondCard.matched = true;
            singleMatched++;
            singleSelectedIdx = null;
            renderSingleBoard();
            playSound(correctAudio);
            updateScoreUI();
            if (singleMatched === singleTotalPairs) {
                if (timerInterval) clearInterval(timerInterval);
                const elapsed = (Date.now() - startTime) / 1000;
                timerDisplaySpan.innerText = `⏱️ 用时: ${elapsed.toFixed(2)} 秒`;
                singleActive = false;
                playSound(winAudio);
                if (elapsed < bestTime) {
                    bestTime = elapsed;
                    localStorage.setItem(bestTimeKey, bestTime);
                    recordMsgSpan.innerHTML = `🎉 新纪录！ ${elapsed.toFixed(2)} 秒 🎉`;
                }
                showVictory();
            }
        } else {
            playSound(wrongAudio);
            singleLock = true;
            setTimeout(() => {
                singleSelectedIdx = null;
                renderSingleBoard();
                singleLock = false;
            }, 400); // 降低锁定时长提高连击连点效率
            singleSelectedIdx = null;
            renderSingleBoard();
        }
    }

    function resetDuel() {
        const words = getCurrentWordList();
        if (!words.length) {
            alert("当前课文无生字，无法开始双人对战");
            return;
        }
        redCards = buildCardSet(words);
        blueCards = buildCardSet(words);
        redMatched = 0; blueMatched = 0;
        redTotal = words.length; blueTotal = words.length;
        redSelected = null; blueSelected = null;
        redLock = false; blueLock = false;
        winnerDeclared = false;
        redScoreSpan.innerText = redMatched; redTotalSpan.innerText = redTotal;
        blueScoreSpan.innerText = blueMatched; blueTotalSpan.innerText = blueTotal;
        renderDuelBoards();
        updateScoreUI();
        if (isAudioUnlocked && bgmEnabled && bgmAudio.paused) {
            bgmAudio.play().catch(() => {});
        }
    }

    function renderDuelBoards() {
        redBoardDiv.innerHTML = '';
        redCards.forEach((card, idx) => {
            const div = document.createElement('div');
            div.className = 'card';
            if (card.matched) div.classList.add('matched');
            if (redSelected === idx) div.classList.add('selected');
            if (card.type === 'pinyin') div.setAttribute('data-type', 'pinyin');
            div.textContent = card.display;
            
            // 双人模式强制升级触摸即动，红蓝互不锁死
            bindFastClick(div, () => onRedClick(idx));
            
            redBoardDiv.appendChild(div);
        });
        blueBoardDiv.innerHTML = '';
        blueCards.forEach((card, idx) => {
            const div = document.createElement('div');
            div.className = 'card';
            if (card.matched) div.classList.add('matched');
            if (blueSelected === idx) div.classList.add('selected');
            if (card.type === 'pinyin') div.setAttribute('data-type', 'pinyin');
            div.textContent = card.display;
            
            bindFastClick(div, () => onBlueClick(idx));
            
            blueBoardDiv.appendChild(div);
        });
    }

    function onRedClick(idx) {
        if (redLock) return;
        unlockAndPreloadAudio();
        const card = redCards[idx];
        if (card.matched) return;
        if (redSelected === idx) { redSelected = null; renderDuelBoards(); return; }
        if (redSelected === null) { redSelected = idx; renderDuelBoards(); return; }
        const first = redCards[redSelected], second = redCards[idx];
        if (first.pairId === second.pairId && first.type !== second.type) {
            first.matched = true; second.matched = true;
            redMatched++; redSelected = null;
            playSound(correctAudio);
            redScoreSpan.innerText = redMatched;
            renderDuelBoards(); updateScoreUI();
            
            if (redMatched === redTotal && !winnerDeclared) {
                winnerDeclared = true; 
                playSound(winAudio);
                showVictory("🏆 红方胜利！🏆");
            }
        } else {
            playSound(wrongAudio);
            redLock = true;
            setTimeout(() => { redSelected = null; renderDuelBoards(); redLock = false; }, 400);
            redSelected = null;
            renderDuelBoards();
        }
    }

    function onBlueClick(idx) {
        if (blueLock) return;
        unlockAndPreloadAudio();
        const card = blueCards[idx];
        if (card.matched) return;
        if (blueSelected === idx) { blueSelected = null; renderDuelBoards(); return; }
        if (blueSelected === null) { blueSelected = idx; renderDuelBoards(); return; }
        const first = blueCards[blueSelected], second = blueCards[idx];
        if (first.pairId === second.pairId && first.type !== second.type) {
            first.matched = true; second.matched = true;
            blueMatched++; blueSelected = null;
            playSound(correctAudio);
            blueScoreSpan.innerText = blueMatched;
            renderDuelBoards(); updateScoreUI();
            
            if (blueMatched === blueTotal && !winnerDeclared) {
                winnerDeclared = true;
                playSound(winAudio);
                showVictory("🏆 蓝方胜利！🏆");
            }
        } else {
            playSound(wrongAudio);
            blueLock = true;
            setTimeout(() => { blueSelected = null; renderDuelBoards(); blueLock = false; }, 400);
            blueSelected = null;
            renderDuelBoards();
        }
    }

    function updateScoreUI() {
        if (!isDuelMode) {
            scoreDisplaySpan.innerText = `✅ 配对: ${singleMatched} / ${singleTotalPairs}`;
        } else {
            scoreDisplaySpan.innerText = `🔴 ${redMatched}/${redTotal}  🔵 ${blueMatched}/${blueTotal}`;
        }
    }

    function showVictory(customMsg) {
        const overlay = document.getElementById('victoryOverlay');
        const msgElem = document.getElementById('victoryMessage');
        if (customMsg) {
            msgElem.innerText = customMsg;
        } else {
            msgElem.innerText = "🎉 胜利！ 🎉";
        }
        overlay.style.visibility = 'visible';
        bgmAudio.pause();
        setTimeout(() => {
            overlay.style.visibility = 'hidden';
            if(bgmEnabled && isAudioUnlocked) bgmAudio.play().catch(() => {});
        }, 3000);
    }

    function setMode(duel) {
        isDuelMode = duel;
        if (duel) {
            singleAreaDiv.style.display = 'none';
            duelAreaDiv.style.display = 'block';
            singleModeBtn.classList.remove('active');
            duelModeBtn.classList.add('active');
            resetDuel();
        } else {
            singleAreaDiv.style.display = 'block';
            duelAreaDiv.style.display = 'none';
            duelModeBtn.classList.remove('active');
            singleModeBtn.classList.add('active');
            resetSingle();
        }
        updateScoreUI();
    }

    function toggleMute() {
        soundEnabled = !soundEnabled;
        muteBtn.innerText = soundEnabled ? "🔊 音效开" : "🔇 音效关";
    }

    const singleModeBtn = document.getElementById('singleModeBtn');
    const duelModeBtn = document.getElementById('duelModeBtn');
    const resetBtn = document.getElementById('resetGameBtn');
    const bgmToggleBtn = document.getElementById('bgmToggleBtn');

    function refreshBySelection() {
        updateLessonOptions();
        if (isDuelMode) resetDuel();
        else resetSingle();
    }

    gradeSelect.addEventListener('change', refreshBySelection);
    volumeSelect.addEventListener('change', refreshBySelection);
    lessonSelect.addEventListener('change', () => {
        setLesson(lessonSelect.value);
    });

    singleModeBtn.addEventListener('click', () => setMode(false));
    duelModeBtn.addEventListener('click', () => setMode(true));
    resetBtn.addEventListener('click', () => {
        if (isDuelMode) resetDuel();
        else resetSingle();
    });
    muteBtn.addEventListener('click', toggleMute);
    bgmToggleBtn.addEventListener('click', toggleBgm);
    prevLessonBtn.addEventListener('click', prevLesson);
    nextLessonBtn.addEventListener('click', nextLesson);

    updateLessonOptions();
    resetSingle();
</script>
</body>
</html>
